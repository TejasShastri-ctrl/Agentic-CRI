services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: my_postgres

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mydb

    ports:
      - "5431:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: